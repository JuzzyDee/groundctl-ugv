# ekf_heading.yaml — robot_localization EKF for rover heading fusion.
#
# Gyro (OAK-D BMI270) is the always-on base; rtabmap VO and rf2o LiDAR odometry
# correct it. Delivers low-drift RELATIVE heading — "turn a commanded amount /
# hold a straight line" — NOT absolute north (no working mag or RTK heading yet;
# that becomes a second, map-frame EKF when the RTK antenna is fixed).
#
# DRAFT — structure is sound, params (esp. covariances) pending the live turn-test.
# See verify-gates in heading_fusion.launch.py header.

ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true          # ground rover — zero out z/roll/pitch; large stability win
    publish_tf: true          # THIS node is the sole owner of odom -> base_footprint
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom         # odom-instance EKF; map+GPS is a later second instance

    # --- imu0: ESP32 raw gyro /imu/data_raw — the always-on base (yaw RATE only) ---
    # NB: was /oak/imu/data, but the OAK IMU streams nothing (publisher present, zero
    # data, cause unresolved 2026-05-25). The ESP32 raw gyro publishes real rates and
    # tested clean under light motor load (no detectable EMI: motors-on was the
    # QUIETEST part of the trace). Use /imu/data_raw, NOT /imu/data (Madgwick zeroes
    # the rates there). Fuse vyaw only; VO+rf2o correct its drift.
    # CAVEAT: clean at free-spin current only — under real driving load untested.
    imu0: /imu/data_raw
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10

    # --- odom0: rtabmap visual odometry (/vo_odom) — yaw correction ---
    # differential: VO re-zeros on relocalisation, so we fuse the yaw DELTA, not the
    # absolute value — a re-zero can't teleport the estimate. Dropout frames arrive
    # with huge covariance from rgbd_odometry, so the filter down-weights them.
    odom0: /vo_odom
    odom0_config: [false, false, false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: true
    odom0_relative: false
    odom0_queue_size: 10

    # --- odom1: rf2o LiDAR odometry (/odom_rf2o) — yaw correction ---
    # Strong yaw where geometry exists (indoor/structured); blind in the open field,
    # where gyro+VO carry. differential for the same reset-safety reason as VO.
    odom1: /odom_rf2o
    odom1_config: [false, false, false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: true
    odom1_relative: false
    odom1_queue_size: 10

    # Process / initial covariance: robot_localization defaults are a sane start.
    # Tune yaw (index 5) and vyaw (index 11) after the live turn-test.
