teleop_node:
  ros__parameters:
    # Deadman: you MUST hold LB to drive. Prevents stick drift from moving the rover.
    # Release LB = immediate zero twist.
    require_enable_button: true
    enable_button: 4           # LB (left bumper)
    enable_turbo_button: 5     # RB (right bumper) — hold for turbo speeds

    # Linear: left stick Y (axis 1)
    # This cheap Waveshare controller reads POSITIVE when stick goes UP — opposite
    # of Xbox convention. Positive scale keeps UP = forward.
    axis_linear.x: 1
    scale_linear.x: 0.35       # normal cruise cap: 0.35 m/s
    scale_linear_turbo.x: 0.60  # turbo: 0.60 m/s (still rover-safe)

    # Angular: right stick X (axis 3)
    # This controller reads NEGATIVE when stick goes RIGHT (opposite of Xbox).
    # ROS convention: angular.z positive = CCW = turn LEFT. We want stick-right =
    # turn-right, which is angular.z negative. With this controller's negative-at-right
    # axis, a positive scale gives us: right (negative axis) × positive scale = negative yaw → turn right.
    axis_angular.yaw: 3
    scale_angular.yaw: 0.80
    scale_angular_turbo.yaw: 1.30

joy_node:
  ros__parameters:
    # Rate at which joy_node polls the joystick. 20Hz matches teleop responsiveness.
    autorepeat_rate: 20.0
    # Dead zone for stick centring — anything within ±0.05 reads as 0.
    # Matters because this cheap controller likely has some drift; larger than you'd
    # want on a premium stick but safer for a deadman-gated controller.
    deadzone: 0.05
    # Device path. joy_node defaults to /dev/input/js0 which is what we want.
    device_id: 0
